<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="行書AI解説">
  <link rel="manifest" href="manifest.json">
  <title>行政書士AI解説</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f0f4f8;
      min-height: 100dvh;
      color: #1e293b;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #settings-btn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
    }

    main { padding: 20px 16px; max-width: 600px; margin: 0 auto; }

    /* === カメラエリア === */
    #capture-area {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    #preview-container {
      position: relative;
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      background: #e2e8f0;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    #preview-img {
      width: 100%;
      display: none;
      border-radius: 10px;
    }

    #preview-placeholder {
      text-align: center;
      color: #94a3b8;
      padding: 40px 20px;
    }

    #preview-placeholder .icon { font-size: 48px; margin-bottom: 8px; }
    #preview-placeholder p { font-size: 14px; }

    #btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { opacity: 0.8; transform: scale(0.98); }

    #btn-camera {
      background: #2563eb;
      color: white;
    }

    #btn-gallery {
      background: #e0e7ff;
      color: #3730a3;
    }

    #analyze-btn {
      width: 100%;
      padding: 16px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: none;
      transition: opacity 0.15s;
    }
    #analyze-btn:active { opacity: 0.8; }
    #analyze-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* === ローディング === */
    #loading {
      display: none;
      text-align: center;
      padding: 32px 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p { color: #64748b; font-size: 14px; }

    /* === 解説結果 === */
    #result {
      display: none;
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    #result-header {
      background: #16a34a;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #result-header span { font-weight: 700; font-size: 15px; }

    #copy-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    #result-body {
      padding: 20px;
      line-height: 1.75;
      font-size: 15px;
    }

    #result-body h2 {
      font-size: 16px;
      color: #2563eb;
      margin: 18px 0 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e0e7ff;
    }
    #result-body h2:first-child { margin-top: 0; }

    #result-body p { margin-bottom: 8px; color: #374151; }

    #result-body ul {
      padding-left: 20px;
      margin-bottom: 8px;
    }
    #result-body li { margin-bottom: 4px; color: #374151; }

    #result-body strong { color: #1e293b; }

    #result-body .correct {
      background: #dcfce7;
      border-left: 4px solid #16a34a;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
    }

    #result-body .wrong {
      background: #fee2e2;
      border-left: 4px solid #ef4444;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
    }

    #result-body .tip {
      background: #fef9c3;
      border-left: 4px solid #eab308;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
      font-size: 14px;
    }

    #result-body .example {
      background: #f0f4ff;
      border-left: 4px solid #2563eb;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
    }

    #new-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 0 20px 20px;
      padding: 14px;
      background: #f1f5f9;
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }

    /* === API設定モーダル === */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-overlay.active { display: flex; }

    #modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    #modal h2 { font-size: 18px; margin-bottom: 8px; }
    #modal p { font-size: 13px; color: #64748b; margin-bottom: 16px; line-height: 1.6; }

    #modal input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
      margin-bottom: 12px;
      outline: none;
    }
    #modal input:focus { border-color: #2563eb; }

    #modal-save {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    #modal a { color: #2563eb; text-decoration: none; }

    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 12px;
      display: none;
    }

    /* 隠しinput */
    #file-input { display: none; }
    #camera-input { display: none; }
  </style>
</head>
<body>

<header>
  <h1>📚 行政書士AI解説</h1>
  <button id="settings-btn" title="APIキー設定">⚙️</button>
</header>

<main>
  <div id="capture-area">
    <div id="preview-container">
      <div id="preview-placeholder">
        <div class="icon">📷</div>
        <p>問題集のページを撮影してください</p>
      </div>
      <img id="preview-img" alt="選択した画像">
    </div>

    <div id="btn-row">
      <button class="btn" id="btn-camera" onclick="openCamera()">
        📷 カメラで撮る
      </button>
      <button class="btn" id="btn-gallery" onclick="openGallery()">
        🖼️ アルバムから
      </button>
    </div>

    <button id="analyze-btn" onclick="analyze()">
      🔍 AIで解説してもらう
    </button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>問題を分析中です…<br>少々お待ちください</p>
  </div>

  <div id="result">
    <div id="result-header">
      <span>✅ AI解説</span>
      <button id="copy-btn" onclick="copyResult()">コピー</button>
    </div>
    <div id="result-body"></div>
    <button id="new-btn" onclick="reset()">＋ 次の問題を解説する</button>
  </div>
</main>

<!-- 隠しファイル入力 -->
<input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleFile(event)">
<input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">

<!-- APIキー設定モーダル -->
<div id="modal-overlay">
  <div id="modal">
    <h2>🔑 APIキーの設定</h2>
    <p>
      Google AI Studio で無料の Gemini APIキーを取得してください。<br>
      <a href="https://aistudio.google.com/apikey" target="_blank">→ aistudio.google.com/apikey</a><br><br>
      入力したキーはこのデバイスにのみ保存され、外部には送信されません。
    </p>
    <div class="error-msg" id="modal-error"></div>
    <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off">
    <button id="modal-save" onclick="saveApiKey()">保存して始める</button>
  </div>
</div>

<script>
  const PROMPT = `この写真は行政書士試験の問題集のページです。
左側に問題、右側に正解と解説が記載されています。

以下の構成で、初学者にも分かりやすく解説してください。

## 問題の要点
何を問われているか、どの法律・条文のテーマかを1〜2文で説明してください。

## 正解と理由
正解の選択肢を明示し、なぜ正解なのかを丁寧に解説してください。

## 誤りの選択肢の解説
各誤り選択肢について「なぜ誤りか」を具体的に説明してください。

## 具体例で理解する
実際の場面（日常生活や仕事など）に置き換えて、直感的に理解できる具体例を挙げてください。

## 試験で使える覚え方
この問題のポイントを試験本番で思い出せるような、シンプルな覚え方・語呂合わせ・ルール化を提案してください。

法律用語は必ず噛み砕いた言葉で補足してください。`;

  let selectedImageBase64 = null;
  let selectedMimeType = null;
  let resultText = '';

  // 初回起動チェック
  window.addEventListener('load', () => {
    if (!localStorage.getItem('gemini_api_key')) {
      showModal();
    }
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  });

  function openCamera() {
    document.getElementById('camera-input').click();
  }

  function openGallery() {
    document.getElementById('file-input').click();
  }

  function handleFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      // base64部分だけ取り出す
      const parts = dataUrl.split(',');
      selectedImageBase64 = parts[1];
      selectedMimeType = file.type || 'image/jpeg';

      // プレビュー表示
      const img = document.getElementById('preview-img');
      const placeholder = document.getElementById('preview-placeholder');
      img.src = dataUrl;
      img.style.display = 'block';
      placeholder.style.display = 'none';

      document.getElementById('analyze-btn').style.display = 'block';
      document.getElementById('result').style.display = 'none';
    };
    reader.readAsDataURL(file);
    // 同じファイルを再選択できるようリセット
    event.target.value = '';
  }

  async function analyze() {
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) { showModal(); return; }
    if (!selectedImageBase64) return;

    const analyzeBtn = document.getElementById('analyze-btn');
    analyzeBtn.disabled = true;
    analyzeBtn.textContent = '解析中…';

    document.getElementById('capture-area').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: PROMPT },
                {
                  inline_data: {
                    mime_type: selectedMimeType,
                    data: selectedImageBase64
                  }
                }
              ]
            }],
            generationConfig: {
              temperature: 0.3,
              maxOutputTokens: 2048
            }
          })
        }
      );

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API エラー (${response.status})`);
      }

      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('解説を取得できませんでした');

      resultText = text;
      renderResult(text);

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('capture-area').style.display = 'block';
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = '🔍 AIで解説してもらう';
      alert('エラーが発生しました:\n' + e.message);
    }
  }

  function renderResult(markdown) {
    document.getElementById('loading').style.display = 'none';

    // Markdownを簡易HTMLに変換
    let html = markdown
      // H2
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      // 太字
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // 箇条書き
      .replace(/^[・\-\*] (.+)$/gm, '<li>$1</li>')
      // 番号リスト
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      // 段落
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');

    // li タグをリストでラップ
    html = html.replace(/(<li>.*?<\/li>)+/gs, (m) => `<ul>${m}</ul>`);
    html = '<p>' + html + '</p>';

    // セクションごとに色分けスタイルを適用
    html = html
      .replace(/<h2>(正解と理由.*?)<\/h2>([\s\S]*?)(?=<h2>|$)/g,
        '<h2>$1</h2><div class="correct">$2</div>')
      .replace(/<h2>(誤り.*?)<\/h2>([\s\S]*?)(?=<h2>|$)/g,
        '<h2>$1</h2><div class="wrong">$2</div>')
      .replace(/<h2>(具体例.*?)<\/h2>([\s\S]*?)(?=<h2>|$)/g,
        '<h2>$1</h2><div class="example">$2</div>')
      .replace(/<h2>(試験.*?覚え.*?)<\/h2>([\s\S]*?)(?=<h2>|$)/g,
        '<h2>$1</h2><div class="tip">$2</div>');

    document.getElementById('result-body').innerHTML = html;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function reset() {
    selectedImageBase64 = null;
    selectedMimeType = null;
    resultText = '';

    const img = document.getElementById('preview-img');
    img.style.display = 'none';
    img.src = '';
    document.getElementById('preview-placeholder').style.display = 'block';

    const analyzeBtn = document.getElementById('analyze-btn');
    analyzeBtn.style.display = 'none';
    analyzeBtn.disabled = false;
    analyzeBtn.textContent = '🔍 AIで解説してもらう';

    document.getElementById('capture-area').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('capture-area').scrollIntoView({ behavior: 'smooth' });
  }

  function copyResult() {
    navigator.clipboard.writeText(resultText).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'コピーしました！';
      setTimeout(() => btn.textContent = 'コピー', 2000);
    });
  }

  // === APIキー設定 ===
  function showModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.add('active');
    const saved = localStorage.getItem('gemini_api_key');
    if (saved) document.getElementById('api-key-input').value = saved;
  }

  document.getElementById('settings-btn').addEventListener('click', showModal);

  function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    const errEl = document.getElementById('modal-error');
    if (!key || !key.startsWith('AIza')) {
      errEl.textContent = 'キーは "AIza" から始まる形式で入力してください';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    localStorage.setItem('gemini_api_key', key);
    document.getElementById('modal-overlay').classList.remove('active');
  }

  document.getElementById('api-key-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveApiKey();
  });

  // モーダル外クリックで閉じる（キー設定済みの場合のみ）
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay') && localStorage.getItem('gemini_api_key')) {
      document.getElementById('modal-overlay').classList.remove('active');
    }
  });
</script>
</body>
</html>
