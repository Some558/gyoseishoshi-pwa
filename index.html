<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="行書AI解説">
  <link rel="manifest" href="manifest.json">
  <script src="heic2any.min.js"></script>
  <title>行政書士AI解説</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f0f4f8;
      min-height: 100dvh;
      color: #1e293b;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #settings-btn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
    }

    main { padding: 20px 16px; max-width: 600px; margin: 0 auto; }

    /* === カメラエリア === */
    #capture-area {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .capture-hint {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .image-slots {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 4px;
    }

    .image-slot {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 12px;
      transition: border-color 0.2s;
    }

    .image-slot.filled {
      border-style: solid;
      border-color: #93c5fd;
      background: #f8fafc;
    }

    .image-slot-label {
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
    }

    .preview-container {
      position: relative;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      background: #e2e8f0;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .preview-img {
      width: 100%;
      display: none;
      border-radius: 8px;
    }

    .preview-placeholder {
      text-align: center;
      color: #94a3b8;
      padding: 28px 16px;
    }

    .preview-placeholder .icon { font-size: 32px; margin-bottom: 6px; }
    .preview-placeholder p { font-size: 13px; }

    .slot-btn-row {
      display: flex;
      gap: 8px;
    }

    .slot-btn-row .btn {
      padding: 10px 8px;
      font-size: 13px;
    }

    .slot-btn-row .btn:first-child {
      background: #2563eb;
      color: white;
    }

    .slot-btn-row .btn:last-child {
      background: #e0e7ff;
      color: #3730a3;
    }
    .btn {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { opacity: 0.8; transform: scale(0.98); }

    #analyze-btn {
      width: 100%;
      padding: 16px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: none;
      transition: opacity 0.15s;
    }
    #analyze-btn:active { opacity: 0.8; }
    #analyze-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* === ローディング === */
    #loading {
      display: none;
      text-align: center;
      padding: 32px 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p { color: #64748b; font-size: 14px; }

    /* === 解説結果 === */
    #result {
      display: none;
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    #result-header {
      background: #16a34a;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #result-header span { font-weight: 700; font-size: 15px; }

    #copy-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    #result-body {
      padding: 20px;
      line-height: 1.75;
      font-size: 15px;
    }

    #result-body h2 {
      font-size: 16px;
      color: #2563eb;
      margin: 18px 0 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e0e7ff;
    }
    #result-body h2:first-child { margin-top: 0; }

    #result-body p { margin-bottom: 8px; color: #374151; }

    #result-body ul {
      padding-left: 20px;
      margin-bottom: 8px;
    }
    #result-body li { margin-bottom: 4px; color: #374151; }

    #result-body strong { color: #1e293b; }

    #result-body .correct {
      background: #dcfce7;
      border-left: 4px solid #16a34a;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
    }

    #result-body .wrong {
      background: #fee2e2;
      border-left: 4px solid #ef4444;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
    }

    #result-body .tip {
      background: #fef9c3;
      border-left: 4px solid #eab308;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
      font-size: 14px;
    }

    #result-body .example {
      background: #f0f4ff;
      border-left: 4px solid #2563eb;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
    }

    #new-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 0 20px 20px;
      padding: 14px;
      background: #f1f5f9;
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }

    /* === API設定モーダル === */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-overlay.active { display: flex; }

    #modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    #modal h2 { font-size: 18px; margin-bottom: 8px; }
    #modal p { font-size: 13px; color: #64748b; margin-bottom: 16px; line-height: 1.6; }

    #modal input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
      margin-bottom: 12px;
      outline: none;
    }
    #modal input:focus { border-color: #2563eb; }

    #modal-save {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    #modal a { color: #2563eb; text-decoration: none; }

    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 12px;
      display: none;
    }

    /* 隠しinput */
    .hidden-input { display: none; }
  </style>
</head>
<body>

<header>
  <h1>📚 行政書士AI解説</h1>
  <button id="settings-btn" title="APIキー設定">⚙️</button>
</header>

<main>
  <div id="capture-area">
    <p class="capture-hint">問題文と正解・解説を、それぞれ撮影またはアルバムから選択してください</p>

    <div class="image-slots">
      <div class="image-slot" id="slot-problem">
        <div class="image-slot-label">① 問題文</div>
        <div class="preview-container">
          <div class="preview-placeholder" id="placeholder-problem">
            <div class="icon">📝</div>
            <p>問題のページ</p>
          </div>
          <img class="preview-img" id="preview-problem" alt="問題文">
        </div>
        <div class="slot-btn-row">
          <button class="btn" id="btn-camera-problem" onclick="openCamera('problem')">📷 撮る</button>
          <button class="btn" id="btn-gallery-problem" onclick="openGallery('problem')">🖼️ アルバム</button>
        </div>
      </div>

      <div class="image-slot" id="slot-answer">
        <div class="image-slot-label">② 正解・解説</div>
        <div class="preview-container">
          <div class="preview-placeholder" id="placeholder-answer">
            <div class="icon">✅</div>
            <p>解答・解説のページ</p>
          </div>
          <img class="preview-img" id="preview-answer" alt="正解・解説">
        </div>
        <div class="slot-btn-row">
          <button class="btn" id="btn-camera-answer" onclick="openCamera('answer')">📷 撮る</button>
          <button class="btn" id="btn-gallery-answer" onclick="openGallery('answer')">🖼️ アルバム</button>
        </div>
      </div>
    </div>

    <button id="analyze-btn" onclick="analyze()">
      🔍 AIで解説してもらう
    </button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>問題を分析中です…<br>少々お待ちください</p>
  </div>

  <div id="result">
    <div id="result-header">
      <span>✅ AI解説</span>
      <button id="copy-btn" onclick="copyResult()">コピー</button>
    </div>
    <div id="result-body"></div>
    <button id="new-btn" onclick="reset()">＋ 次の問題を解説する</button>
  </div>
</main>

<!-- 隠しファイル入力 -->
<input type="file" class="hidden-input" id="camera-input-problem" accept="image/*" capture="environment" data-slot="problem" onchange="handleFile(event)">
<input type="file" class="hidden-input" id="file-input-problem" accept="image/*,.heic,.heif" data-slot="problem" onchange="handleFile(event)">
<input type="file" class="hidden-input" id="camera-input-answer" accept="image/*" capture="environment" data-slot="answer" onchange="handleFile(event)">
<input type="file" class="hidden-input" id="file-input-answer" accept="image/*,.heic,.heif" data-slot="answer" onchange="handleFile(event)">

<!-- APIキー設定モーダル -->
<div id="modal-overlay">
  <div id="modal">
    <h2>🔑 APIキーの設定</h2>
    <p>
      Anthropic Console でAPIキーを取得してください。<br>
      <a href="https://console.anthropic.com/settings/keys" target="_blank">→ console.anthropic.com/settings/keys</a><br><br>
      入力したキーはこのデバイスにのみ保存されます。
    </p>
    <div class="error-msg" id="modal-error"></div>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
    <button id="modal-save" onclick="saveApiKey()">保存して始める</button>
  </div>
</div>

<script>
  const PROMPT = `1枚目の写真は行政書士試験の「問題文」です。
2枚目の写真は「正解と解説」が記載された解答ページです。

【最優先のチェック】
まず2枚目（解答ページ）が鮮明に読み取れるか確認してください。
正解の選択肢や解説の文字が、ブレ・見切れ・ピンボケ・暗さなどで正確に読み取れない場合は、
無理に解説せず、次の一文だけを返してください：

## 判定不可
解答ページを正確に読み取れませんでした。明るい場所で、ページ全体がはっきり写るように撮り直してください。

読み取れる場合のみ、以下の構成で初学者にも分かりやすく解説してください。

## 問題の要点
何を問われているか、どの法律・条文のテーマかを1〜2文で説明してください。

## 正解と理由
正解の選択肢を明示し、なぜ正解なのかを丁寧に解説してください。

## 誤りの選択肢の解説
各誤り選択肢について「なぜ誤りか」を具体的に説明してください。

## 具体例で理解する
実際の場面（日常生活や仕事など）に置き換えて、直感的に理解できる具体例を挙げてください。

## 試験で使える覚え方
この問題のポイントを試験本番で思い出せるような、シンプルな覚え方・語呂合わせ・ルール化を提案してください。

法律用語は必ず噛み砕いた言葉で補足してください。

---
【正確さのための重要ルール】
- 2枚目の解答ページに書かれている正解・解説を最優先の事実とし、それと矛盾する推測は書かないこと。
- 条文番号や判例名は、写真に明記されている場合のみ引用すること。記憶で補わない。曖昧な場合は「条文番号は問題集をご確認ください」と書く。
- 解説は丁寧かつ正確に。不確かな情報を断定口調で書かないこと。`;

  const images = { problem: null, answer: null };
  const loadGeneration = { problem: 0, answer: 0 };
  let resultText = '';

  // 初回起動チェック
  window.addEventListener('load', () => {
    if (!localStorage.getItem('anthropic_api_key')) {
      showModal();
    }
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  });

  function openCamera(slot) {
    if (!['problem', 'answer'].includes(slot)) return;
    document.getElementById(`camera-input-${slot}`).click();
  }

  function openGallery(slot) {
    if (!['problem', 'answer'].includes(slot)) return;
    document.getElementById(`file-input-${slot}`).click();
  }

  function updateAnalyzeBtn() {
    const ready = images.problem && images.answer;
    document.getElementById('analyze-btn').style.display = ready ? 'block' : 'none';
  }

  function updateSlotPreview(slot, jpegDataUrl) {
    const img = document.getElementById(`preview-${slot}`);
    img.src = jpegDataUrl;
    img.style.display = 'block';
    document.getElementById(`placeholder-${slot}`).style.display = 'none';
    document.getElementById(`slot-${slot}`).classList.add('filled');
    document.getElementById('result').style.display = 'none';
    updateAnalyzeBtn();
  }

  function toJpegDataUrl(dataUrl, options = {}) {
    const { maxSize = 1600, quality = 0.88, enhance = false } = options;
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        if (enhance) {
          const imageData = ctx.getImageData(0, 0, w, h);
          const d = imageData.data;
          const contrast = 1.25;
          const intercept = 128 * (1 - contrast);
          for (let i = 0; i < d.length; i += 4) {
            d[i] = Math.min(255, Math.max(0, d[i] * contrast + intercept));
            d[i + 1] = Math.min(255, Math.max(0, d[i + 1] * contrast + intercept));
            d[i + 2] = Math.min(255, Math.max(0, d[i + 2] * contrast + intercept));
          }
          ctx.putImageData(imageData, 0, 0);
        }
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('画像を読み込めませんでした'));
      img.src = dataUrl;
    });
  }

  const SLOT_IMAGE_OPTIONS = {
    problem: { maxSize: 1600, quality: 0.88, enhance: false },
    answer: { maxSize: 2400, quality: 0.95, enhance: true },
  };

  async function fileToJpegDataUrl(file, slot) {
    const isHeic = file.type === 'image/heic'
      || file.type === 'image/heif'
      || file.name.toLowerCase().endsWith('.heic')
      || file.name.toLowerCase().endsWith('.heif');

    let blob = file;
    if (isHeic) {
      if (typeof heic2any !== 'function') {
        throw new Error('HEIC変換ライブラリを読み込めませんでした');
      }
      blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.88 });
      if (Array.isArray(blob)) blob = blob[0];
    }

    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          resolve(await toJpegDataUrl(e.target.result, SLOT_IMAGE_OPTIONS[slot] || SLOT_IMAGE_OPTIONS.problem));
        } catch (err) {
          reject(err);
        }
      };
      reader.onerror = () => reject(new Error('読み込みエラー'));
      reader.readAsDataURL(blob);
    });
  }

  function handleFile(event) {
    const file = event.target.files[0];
    const slot = event.target.dataset.slot;
    if (!file || !slot || !['problem', 'answer'].includes(slot)) return;
    event.target.value = '';

    images[slot] = null;
    updateAnalyzeBtn();
    const generation = ++loadGeneration[slot];

    (async () => {
      try {
        const jpegDataUrl = await fileToJpegDataUrl(file, slot);
        if (loadGeneration[slot] !== generation) return;
        images[slot] = jpegDataUrl.split(',')[1];
        updateSlotPreview(slot, jpegDataUrl);
      } catch (err) {
        if (loadGeneration[slot] !== generation) return;
        alert('画像の読み込みに失敗しました。別の写真を試してください。\n' + err.message);
      }
    })();
  }

  async function analyze() {
    const apiKey = localStorage.getItem('anthropic_api_key');
    if (!apiKey) { showModal(); return; }
    if (!images.problem || !images.answer) return;

    const requestBody = {
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2048,
          messages: [{
            role: 'user',
            content: [
              { type: 'text', text: '【1枚目: 問題文のページ】' },
              {
                type: 'image',
                source: {
                  type: 'base64',
                  media_type: 'image/jpeg',
                  data: images.problem
                }
              },
              { type: 'text', text: '【2枚目: 正解と解説が書かれた解答ページ】' },
              {
                type: 'image',
                source: {
                  type: 'base64',
                  media_type: 'image/jpeg',
                  data: images.answer
                }
              },
              { type: 'text', text: PROMPT }
            ]
          }]
        };

    if (new Blob([JSON.stringify(requestBody)]).size > 12 * 1024 * 1024) {
      alert('画像サイズが大きすぎます。別の写真を選ぶか、もう一度撮影してください。');
      return;
    }

    const analyzeBtn = document.getElementById('analyze-btn');
    analyzeBtn.disabled = true;
    analyzeBtn.textContent = '解析中…';

    document.getElementById('capture-area').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(requestBody)
      });

      if (!response.ok) {
        const raw = await response.text();
        let message = `API エラー (${response.status})`;
        try {
          const err = JSON.parse(raw);
          message = err.error?.message || message;
        } catch (_) {}
        throw new Error(message);
      }

      const data = await response.json();
      const text = data.content?.[0]?.text;
      if (!text) throw new Error('解説を取得できませんでした');

      resultText = text;
      renderResult(text);

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('capture-area').style.display = 'block';
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = '🔍 AIで解説してもらう';
      alert('エラーが発生しました:\n' + e.message);
    }
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderResult(markdown) {
    document.getElementById('loading').style.display = 'none';

    const safe = escapeHtml(markdown);

    // Markdownを簡易HTMLに変換
    let html = safe
      // H2
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      // 太字
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // 箇条書き
      .replace(/^[・\-\*] (.+)$/gm, '<li>$1</li>')
      // 番号リスト
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      // 段落
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');

    // li タグをリストでラップ
    html = html.replace(/(<li>.*?<\/li>)+/gs, (m) => `<ul>${m}</ul>`);
    html = '<p>' + html + '</p>';

    // セクションごとに色分けスタイルを適用
    html = html
      .replace(/<h2>(正解と理由.*?)<\/h2>([\s\S]*?)(?=<h2>|$)/g,
        '<h2>$1</h2><div class="correct">$2</div>')
      .replace(/<h2>(誤り.*?)<\/h2>([\s\S]*?)(?=<h2>|$)/g,
        '<h2>$1</h2><div class="wrong">$2</div>')
      .replace(/<h2>(具体例.*?)<\/h2>([\s\S]*?)(?=<h2>|$)/g,
        '<h2>$1</h2><div class="example">$2</div>')
      .replace(/<h2>(試験.*?覚え.*?)<\/h2>([\s\S]*?)(?=<h2>|$)/g,
        '<h2>$1</h2><div class="tip">$2</div>');

    document.getElementById('result-body').innerHTML = html;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function reset() {
    images.problem = null;
    images.answer = null;
    loadGeneration.problem = 0;
    loadGeneration.answer = 0;
    resultText = '';

    ['problem', 'answer'].forEach((slot) => {
      const img = document.getElementById(`preview-${slot}`);
      img.style.display = 'none';
      img.src = '';
      document.getElementById(`placeholder-${slot}`).style.display = 'block';
      document.getElementById(`slot-${slot}`).classList.remove('filled');
    });

    const analyzeBtn = document.getElementById('analyze-btn');
    analyzeBtn.style.display = 'none';
    analyzeBtn.disabled = false;
    analyzeBtn.textContent = '🔍 AIで解説してもらう';

    document.getElementById('capture-area').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('capture-area').scrollIntoView({ behavior: 'smooth' });
  }

  function copyResult() {
    navigator.clipboard.writeText(resultText).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'コピーしました！';
      setTimeout(() => btn.textContent = 'コピー', 2000);
    }).catch(() => alert('コピーできませんでした'));
  }

  // === APIキー設定 ===
  function showModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.add('active');
    const saved = localStorage.getItem('anthropic_api_key');
    if (saved) document.getElementById('api-key-input').value = saved;
  }

  document.getElementById('settings-btn').addEventListener('click', showModal);

  function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    const errEl = document.getElementById('modal-error');
    if (!key || !key.startsWith('sk-ant-')) {
      errEl.textContent = 'キーは "sk-ant-" から始まる形式で入力してください';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    localStorage.setItem('anthropic_api_key', key);
    document.getElementById('modal-overlay').classList.remove('active');
  }

  document.getElementById('api-key-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveApiKey();
  });

  // モーダル外クリックで閉じる（キー設定済みの場合のみ）
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay') && localStorage.getItem('anthropic_api_key')) {
      document.getElementById('modal-overlay').classList.remove('active');
    }
  });
</script>
</body>
</html>
